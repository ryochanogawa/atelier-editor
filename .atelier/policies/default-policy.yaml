name: default-policy
description: ATELIER Editor プロジェクトのコーディング規約

rules:
  naming:
    - "コンポーネント: PascalCase (例: FileExplorer, TabBar)"
    - "フック: use プレフィックス + camelCase (例: useConnection, useKeyboardShortcuts)"
    - "ストア: camelCase (例: useWorkspaceStore)"
    - "型/インターフェース: PascalCase (例: FileTreeNode, Tab)"
    - "定数: UPPER_SNAKE_CASE (例: ATELIER_THEME_NAME)"
    - "ファイル: PascalCase.tsx (コンポーネント), camelCase.ts (その他)"

  code_structure:
    - "1ファイル1コンポーネントを原則とする"
    - "クライアントコンポーネントは先頭に 'use client' を明記"
    - "関数は30行以内を目安にし、超える場合は分割を検討"
    - "any 型は禁止、unknown + 型ガードを使用"
    - "パスエイリアス @/ を使用 (例: @/stores/workspace)"

  react:
    - "Server Components をデフォルトとし、インタラクティブな部分のみ Client Components にする"
    - "useCallback / useMemo は計測に基づいて適用（premature optimization を避ける）"
    - "props は 5 個以下、超える場合はオブジェクトにまとめるか設計を見直す"
    - "key には安定した一意の値を使用（index は避ける）"

  styling:
    - "Tailwind CSS ユーティリティクラスを使用"
    - "インラインスタイルは動的な値（width, paddingLeft 等）のみ許可"
    - "カラーは CSS 変数 (var(--xxx)) または Tailwind テーマカラーを使用"
    - "レスポンシブ対応: モバイルファーストで設計"

  state_management:
    - "グローバル状態は Zustand で管理"
    - "セレクターは最小限のフィールドを購読（再レンダリング最小化）"
    - "非同期処理はストア内のアクションで完結させる"

  error_handling:
    - "WebSocket 通信エラーは適切にハンドリングし、UIにフィードバックを表示"
    - "try-catch は具体的なエラー型でキャッチ"
    - "ユーザーに影響するエラーは StatusBar またはトースト通知で表示"
