name: test-policy
description: ATELIER Editor のテスト規約

rules:
  structure:
    - "AAA パターン (Arrange-Act-Assert) を厳守"
    - "1テスト1振る舞い、複数のアサーションは関連するもののみ"
    - "テスト名は日本語で振る舞いを記述 (例: 'ファイルを選択するとタブが開く')"
    - "describe でコンポーネント/関数単位にグループ化"

  coverage:
    - "ステートメントカバレッジ: 80% 以上"
    - "ブランチカバレッジ: 70% 以上"
    - "クリティカルパス（ファイル操作、WebSocket通信）: 100%"

  tools:
    - "テストランナー: Vitest"
    - "コンポーネントテスト: React Testing Library"
    - "ユーザー操作: @testing-library/user-event"
    - "Monaco Editor: jest-mock または vi.mock でモック"

  practices:
    - "テスト間の独立性を保証（Zustand ストアは毎テストリセット）"
    - "要素の取得は role > label > text > data-testid の優先順位"
    - "非同期処理は waitFor / findBy で待機"
    - "スナップショットテストは避け、振る舞いベースのテストを優先"
