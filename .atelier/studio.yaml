studio:
  default_medium: claude-code
  language: ja
  log_level: info
  description: "ATELIER Editor — ブラウザベースのコードエディタ (Next.js 16 / React 19 / Monaco Editor / Zustand / Tailwind CSS 4)"

media:
  claude-code:
    command: claude
    args: ["--print", "--model", "claude-opus-4-6", "--dangerously-skip-permissions"]
  codex:
    command: codex
    args: ["--quiet"]
  gemini:
    command: gemini
    args: ["--prompt"]
