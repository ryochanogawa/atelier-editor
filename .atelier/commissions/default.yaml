name: default
description: フロントエンド機能の設計・実装・テスト・レビューを一貫して行う標準ワークフロー

strokes:
  - name: plan
    palette: planner
    knowledge:
      - editor-architecture
    contract: plan-output
    instruction: |
      以下の要件定義に基づき、ATELIER Editorプロジェクトの機能設計を行ってください。
      技術スタック: Next.js 16, React 19, Monaco Editor, Zustand, Tailwind CSS 4, WebSocket (JSON-RPC 2.0)

      以下を明確にしてください:
      - コンポーネント設計（Atomic Designベース）
      - 状態管理の方針（Zustand store の構造変更）
      - WebSocket RPC の追加メソッド（必要な場合）
      - 型定義（TypeScript strict mode）
    inputs:
      - requirements
    outputs:
      - implementation_plan
    transitions:
      - condition: default
        next: implement

  - name: implement
    palette: coder
    allow_edit: true
    knowledge:
      - editor-architecture
    contract: implementation-output
    instruction: |
      あなたはファイルを直接編集するエージェントです。
      以下の設計に基づき、Edit ツールと Write ツールを使ってプロジェクトのファイルを実際に変更・作成してください。
      テキストで計画や説明を述べるのではなく、必ずツールを使ってコードを書いてください。

      プロジェクトルート: /Users/ogawaryou/Developer/atelier-editor

      プロジェクト構成:
        src/app/          — Next.js App Router (layout, page, globals.css)
        src/components/   — UIコンポーネント (Editor/, 今後追加)
        src/hooks/        — カスタムフック (useConnection, useKeyboardShortcuts)
        src/stores/       — Zustand ストア (workspace.ts)
        src/lib/rpc/      — JSON-RPC 2.0 クライアント
        scripts/          — 開発用サーバー (dev-server.mjs)

      規約:
        - React Server Components をデフォルトとし、クライアントコンポーネントは "use client" を明示
        - スタイリングは Tailwind CSS ユーティリティクラスを使用
        - 状態はZustandで管理、propsバケツリレーは避ける
        - 型は厳密に定義、any 禁止

      重要: 必ず Read でファイルを読み、Edit または Write でファイルを変更してください。
    inputs:
      - implementation_plan
    outputs:
      - implementation
    transitions:
      - condition: default
        next: test

  - name: test
    palette: tester
    knowledge:
      - editor-architecture
    contract: test-output
    instruction: |
      実装されたコードのテストを作成・実行してください。

      テスト対象:
        - コンポーネントの描画とインタラクション
        - Zustand ストアのアクション
        - JSON-RPC クライアントの通信
        - キーボードショートカット

      テストフレームワーク: Vitest + React Testing Library を想定
    inputs:
      - implementation
    outputs:
      - test_results
    transitions:
      - condition: default
        next: review

  - name: review
    palette: reviewer
    knowledge:
      - editor-architecture
    contract: review-output
    instruction: |
      実装とテスト結果をレビューしてください。

      観点:
        - TypeScript の型安全性（strict mode 準拠）
        - React のパフォーマンス（不要な再レンダリング、メモ化）
        - アクセシビリティ（WCAG 2.1 AA）
        - Zustand の状態設計（正規化、セレクター粒度）
        - セキュリティ（WebSocket 入力のバリデーション）
    inputs:
      - implementation
      - test_results
    outputs:
      - review_result
