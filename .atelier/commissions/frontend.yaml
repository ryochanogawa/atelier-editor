name: frontend
description: UI/UXデザインから実装・ビジュアルレビューまでのフロントエンド特化ワークフロー

strokes:
  - name: design
    palette: designer
    knowledge:
      - editor-architecture
    contract: plan-output
    instruction: |
      ATELIER Editorの UI/UX 設計を行ってください。

      現在のコンポーネント構成:
        - EditorLayout: メインレイアウト（サイドバー + エディタ領域）
        - FileExplorer: ファイルツリーサイドバー
        - TabBar: 開いているファイルのタブ管理
        - CodeEditor: Monaco Editor ラッパー
        - StatusBar: 下部ステータスバー

      デザイン方針:
        - ダークテーマ基調（VS Code ライクだが独自性を持たせる）
        - Tailwind CSS 4 のユーティリティクラスで実装可能な設計
        - レスポンシブ対応（サイドバーの折りたたみ等）
        - キーボードナビゲーション対応
    inputs:
      - requirements
    outputs:
      - ui_design
    transitions:
      - condition: default
        next: implement

  - name: implement
    palette: coder
    allow_edit: true
    knowledge:
      - editor-architecture
    contract: implementation-output
    instruction: |
      あなたはファイルを直接編集するエージェントです。
      以下のUI設計に基づき、Edit ツールと Write ツールを使ってプロジェクトのファイルを実際に変更・作成してください。
      テキストで計画や説明を述べるのではなく、必ずツールを使ってコードを書いてください。

      プロジェクトルート: /Users/ogawaryou/Developer/atelier-editor

      技術要件:
        - React 19 + TypeScript strict mode
        - Tailwind CSS 4 でスタイリング（CSS-in-JS は使わない）
        - Monaco Editor API を活用（カスタムテーマ、キーバインド、言語拡張）
        - Zustand でエディタ状態を管理
        - アニメーションは CSS トランジションで最小限に

      重要: 必ず Read でファイルを読み、Edit または Write でファイルを変更してください。
    inputs:
      - ui_design
    outputs:
      - implementation
    transitions:
      - condition: default
        next: visual-review

  - name: visual-review
    palette: reviewer
    knowledge:
      - editor-architecture
    contract: review-output
    instruction: |
      実装されたUIをレビューしてください。

      チェック項目:
        - デザイン仕様との一致
        - レスポンシブ対応の確認
        - WCAG 2.1 AA 準拠（コントラスト比、フォーカス管理、スクリーンリーダー対応）
        - インタラクションのスムーズさ
        - ダークテーマの視認性
    inputs:
      - ui_design
      - implementation
    outputs:
      - review_result
