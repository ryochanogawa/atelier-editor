name: review-output
description: コードレビュー結果の出力フォーマット

fields:
  - name: verdict
    type: enum
    values: [approved, changes_requested, needs_discussion]
    description: レビュー結果の判定

  - name: findings
    type: array
    items:
      - name: severity
        type: enum
        values: [critical, major, minor, suggestion]
      - name: file
        type: string
      - name: line
        type: number
      - name: description
        type: string
      - name: suggestion
        type: string

  - name: summary
    type: string
    description: レビューの総括

format: |
  ## レビュー結果: {{verdict}}

  ### 指摘事項
  {{#each findings}}
  - **[{{severity}}]** `{{file}}:{{line}}`
    {{description}}
    → {{suggestion}}
  {{/each}}

  ### 総括
  {{summary}}
